<nav class="menu-principal">
  <div class="marca">
    <span class="icone-marca">🎓</span>
    <div>
      <strong>Catálogo de Disciplinas</strong>
      <small>Grade de interesse acadêmica</small>
    </div>
  </div>

  <div class="links-menu">
    <a routerLink="/home" routerLinkActive="ativo">Home</a>
    <a routerLink="/itens" routerLinkActive="ativo">Listagem</a>
    <a routerLink="/favoritos" routerLinkActive="ativo">Favoritos</a>
    <a routerLink="/sobre" routerLinkActive="ativo">Sobre</a>
    <a routerLink="/admin/campanhas" routerLinkActive="ativo">Admin Campanhas</a>
    <a routerLink="/admin/campanha-form" routerLinkActive="ativo">Nova Campanha</a>

    @if (authService.estaAutenticado()) {
      <button type="button" class="botao-sair" (click)="sair()">Logout</button>
    } @else {
      <a routerLink="/login" routerLinkActive="ativo">Login</a>
    }
  </div>
</nav>

@if (carregando$ | async) {
  <div class="loading-global">
    <div class="caixa-loading">
      <span class="spinner"></span>
      <strong>Carregando...</strong>
    </div>
  </div>
}

@if (mensagem$ | async; as mensagem) {
  <div class="mensagem-global" [class.sucesso]="mensagem.tipo === 'sucesso'" [class.erro]="mensagem.tipo === 'erro'">
    {{ mensagem.texto }}
  </div>
}

<main class="conteudo-principal">
  <router-outlet></router-outlet>
</main>
